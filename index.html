<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj Filmový Přehrávač</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Styl pro skryté titulky přímo ve videu */
        video::cue {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Název Vašeho Filmu</h1>
    
    <div class="player-wrapper">
        <video controls poster="nahledovy-obrazek.jpg" preload="metadata">
            <!-- Hlavní soubor s filmem -->
            <source src="http://nahnoji.cz/data.mp4?id=11234&s=639169743189024570&k=3b32abbc28037f1abcfc8fa0ee6d3c39" type="video/mp4">
            
            <!-- Volitelné titulky (formát .vtt) -->
            <track src="titulky.vtt" kind="subtitles" srclang="cs" label="Čeština" default>
            
            Vaše rozhraní nepodporuje přehrávání HTML5 videí.
        </video>
    </div>
</div>

</body>
</html>
